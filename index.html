<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status | ryopc Global Digital Support</title>
  <style>
    /* ----------------------------------
       RESET & BASE STYLES
       ---------------------------------- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* デフォルトカラー（503：インディゴ/ブルーバイオレット） */
      --theme-color: #6366f1;
      --theme-color-rgb: 99, 102, 241;
      --theme-glow: rgba(99, 102, 241, 0.2);
      --bg-color: #02040a;
    }

    body {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 40px 24px;
      position: relative;
    }

    /* ----------------------------------
       CYBER DETAILED BACKGROUND (Grid & Scanlines)
       ---------------------------------- */
    .bg-glow-container {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    /* サイバーテクノロジーグリッド */
    .bg-grid {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.007) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.007) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: center;
      z-index: 2;
    }

    /* 微細な走査線 */
    .bg-scanlines {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%, 
        rgba(0, 0, 0, 0.15) 50%
      );
      background-size: 100% 4px;
      z-index: 3;
    }

    /* 有機的に揺らめくバックライト */
    .bg-glow-orb-1 {
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--theme-color-rgb), 0.14) 0%, rgba(var(--theme-color-rgb), 0) 70%);
      top: -250px;
      left: -150px;
      animation: floatOrb1 25s infinite alternate ease-in-out;
      filter: blur(40px);
    }

    .bg-glow-orb-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--theme-color-rgb), 0.09) 0%, rgba(var(--theme-color-rgb), 0) 70%);
      bottom: -200px;
      right: -150px;
      animation: floatOrb2 30s infinite alternate ease-in-out;
      filter: blur(40px);
    }

    @keyframes floatOrb1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(120px, 80px) scale(1.1); }
    }

    @keyframes floatOrb2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-90px, -110px) scale(1.15); }
    }

    /* ----------------------------------
       NEOFUTURIST GLASS CONTAINER
       ---------------------------------- */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      max-width: 580px;
      width: 100%;
      background: rgba(6, 8, 16, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.09);
      padding: 65px 45px;
      border-radius: 32px;
      box-shadow: 
        0 30px 70px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(var(--theme-color-rgb), 0.03),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      animation: cardFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* コンテナの四隅にSF風L字パーツを装飾 */
    .container::before, .container::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: rgba(var(--theme-color-rgb), 0.3);
      border-style: solid;
      pointer-events: none;
    }
    .container::before {
      top: 20px;
      left: 20px;
      border-width: 2px 0 0 2px;
    }
    .container::after {
      bottom: 20px;
      right: 20px;
      border-width: 0 2px 2px 0;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ----------------------------------
       LANGUAGE SWITCHER
       ---------------------------------- */
    .lang-switcher {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 6px;
      z-index: 20;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #9ca3af;
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #ffffff;
    }

    .lang-btn.active {
      background: var(--theme-color);
      border-color: var(--theme-color);
      color: #ffffff;
      box-shadow: 0 0 10px rgba(var(--theme-color-rgb), 0.3);
    }

    /* ----------------------------------
       CYBER 3-STAGE NEON SPINNER
       ---------------------------------- */
    .spinner-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 38px;
    }

    .spinner-outer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.02);
      border-top: 2px solid var(--theme-color);
      border-right: 2px solid var(--theme-color);
      border-radius: 50%;
      animation: spinClockwise 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      filter: drop-shadow(0 0 8px var(--theme-color));
    }

    .spinner-inner {
      position: absolute;
      top: 14px;
      left: 14px;
      width: calc(100% - 28px);
      height: calc(100% - 28px);
      border: 1px dashed rgba(255, 255, 255, 0.03);
      border-bottom: 2px solid var(--theme-color);
      border-left: 2px solid var(--theme-color);
      border-radius: 50%;
      opacity: 0.8;
      animation: spinCounterClockwise 1.5s linear infinite;
    }

    .spinner-core {
      position: absolute;
      top: 38px;
      left: 38px;
      width: 24px;
      height: 24px;
      background-color: var(--theme-color);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--theme-color), 0 0 40px var(--theme-color);
      animation: pulseCore 1.5s infinite alternate ease-in-out;
    }

    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spinCounterClockwise {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulseCore {
      0% { transform: scale(0.75); opacity: 0.5; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* ----------------------------------
       TYPOGRAPHY & BADGE
       ---------------------------------- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(var(--theme-color-rgb), 0.08);
      border: 1px solid rgba(var(--theme-color-rgb), 0.25);
      color: var(--theme-color);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 8px 18px;
      border-radius: 6px;
      margin-bottom: 26px;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(var(--theme-color-rgb), 0.05);
    }

    .status-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      background-color: var(--theme-color);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 10px var(--theme-color);
      animation: pulseIndicator 1s infinite alternate ease-in-out;
    }

    @keyframes pulseIndicator {
      0% { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    h1 {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      line-height: 1.35;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
      color: #ffffff;
      background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    p {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.8;
      margin-bottom: 28px;
    }

    /* ----------------------------------
       SYSTEM LOGS (Tech Display Area)
       ---------------------------------- */
    .system-log-box {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 34px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.72rem;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .log-line {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .log-status {
      color: var(--theme-color);
      font-weight: 700;
      text-shadow: 0 0 8px rgba(var(--theme-color-rgb), 0.3);
    }

    /* ----------------------------------
       INTERACTIVE BUTTONS
       ---------------------------------- */
    .btn-container {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .status-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 14px 28px;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid transparent;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--theme-color);
      color: #ffffff;
      box-shadow: 
        0 4px 20px rgba(var(--theme-color-rgb), 0.25),
        0 1px 0 rgba(255, 255, 255, 0.2) inset;
    }

    .btn-primary:hover {
      background: #ffffff;
      color: #02040a;
      transform: translateY(-3px);
      box-shadow: 
        0 15px 30px rgba(255, 255, 255, 0.15),
        0 0 15px rgba(var(--theme-color-rgb), 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.02);
      color: #d1d5db;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
    }

    .btn-secondary:hover {
      background: rgba(var(--theme-color-rgb), 0.08);
      color: #ffffff;
      border-color: rgba(var(--theme-color-rgb), 0.4);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(var(--theme-color-rgb), 0.1);
    }

    .status-btn svg {
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .status-btn:hover svg {
      transform: translate(2px, -1px);
    }

    /* ----------------------------------
       COLLAPSIBLE SUPPORT PANEL (Contact)
       ---------------------------------- */
    .contact-accordion {
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      padding-top: 25px;
      text-align: left;
    }

    .accordion-trigger {
      width: 100%;
      background: none;
      border: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #9ca3af;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      padding: 10px 0;
      transition: color 0.25s;
    }

    .accordion-trigger:hover {
      color: var(--theme-color);
    }

    .accordion-icon {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--theme-color);
    }

    .accordion-trigger.active .accordion-icon {
      transform: rotate(180deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .form-card {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 24px;
      margin-top: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px 16px;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }

    .form-control:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--theme-color);
      box-shadow: 0 0 10px rgba(var(--theme-color-rgb), 0.15);
    }

    textarea.form-control {
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      background: rgba(var(--theme-color-rgb), 0.12);
      border: 1px solid rgba(var(--theme-color-rgb), 0.4);
      color: var(--theme-color);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .submit-btn:hover {
      background: var(--theme-color);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(var(--theme-color-rgb), 0.3);
    }

    /* ----------------------------------
       FOOTER
       ---------------------------------- */
    .footer {
      margin-top: 35px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 24px;
      font-size: 0.72rem;
      color: #4b5563;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* ----------------------------------
       RESPONSIVE DESIGN
       ---------------------------------- */
    @media (max-width: 640px) {
      .container {
        padding: 40px 24px;
        border-radius: 24px;
      }
      h1 {
        font-size: 1.5rem;
      }
      p {
        font-size: 0.88rem;
        line-height: 1.7;
      }
      .system-log-box {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 10px 14px;
      }
      .btn-container {
        flex-direction: column;
        gap: 12px;
      }
      .status-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Glowing Background -->
  <div class="bg-glow-container">
    <div class="bg-grid"></div>
    <div class="bg-scanlines"></div>
    <div class="bg-glow-orb-1" id="orb1"></div>
    <div class="bg-glow-orb-2" id="orb2"></div>
  </div>

  <div class="container">
    <!-- Language Selector Top-Right -->
    <div class="lang-switcher">
      <button class="lang-btn" id="langJaBtn" onclick="setLanguage('ja')">JP</button>
      <button class="lang-btn" id="langEnBtn" onclick="setLanguage('en')">EN</button>
    </div>

    <!-- Spinning Technology Ring -->
    <div class="spinner-container">
      <div class="spinner-outer" id="spinOuter"></div>
      <div class="spinner-inner" id="spinInner"></div>
      <div class="spinner-core" id="spinCore"></div>
    </div>
    
    <!-- Code / Status Badge -->
    <div class="status-badge" id="statusBadge">HTTP 503 : UNDER MAINTENANCE</div>
    
    <!-- Main Alert Title -->
    <h1 id="statusTitle">只今、システム調整を行っています</h1>
    
    <!-- Sophisticated Description Text -->
    <p id="statusDesc">
      ryopc Global Digital Support をご利用いただきありがとうございます。<br>
      現在、新機能 of 追加およびサーバー基盤の最適化作業を実施しております。サービス再開まで今しばらくお待ちください。
    </p>

    <!-- Tech Diagnostic Log Box -->
    <div class="system-log-box">
      <div class="log-line">
        <span id="logSecLabel">SECURITY: </span>
        <span class="log-status" id="logSec">ENCRYPTED_SSL</span>
      </div>
      <div class="log-line">
        <span id="logSysLabel">SYSTEM_STATUS: </span>
        <span class="log-status" id="logSys">DEGRADED</span>
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="btn-container" id="btnContainer">
      <!-- ホームに戻るボタン（リンク先：https://ryopc.f5.si） -->
      <a href="https://ryopc.f5.si" class="status-btn" id="homeBtn">
        <span id="homeBtnText">ホームに戻る</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10.6667 12.6667V8H5.33333V12.6667M2 6.66667L8 1.33333L14 6.66667V12.6667C14 13.037 13.7893 13.3333 13.3333 13.3333H2.66667C2.21067 13.3333 2 13.037 2 12.6667V6.66667Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <!-- システム稼働状況ボタン -->
      <a href="https://st.ryopc.f5.si" class="status-btn" id="statusBtn" target="_blank" rel="noopener noreferrer">
        <span id="statusBtnText">現在のシステム稼働状況</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4.66663 11.3333L11.3333 4.66663M11.3333 4.66663H6.66663M11.3333 4.66663V9.3333" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- Collapsible Support Panel -->
    <div class="contact-accordion">
      <button class="accordion-trigger" id="accordionTrigger">
        <span id="contactTitleText">サポートへ直接問い合わせる</span>
        <svg class="accordion-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 5L8 11L14 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="accordion-content" id="accordionContent">
        <div class="form-card">
          <form id="contact-form" action="https://form-api.ryopc.f5.si/" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="_redirect" value="https://game-ryo.is-a.dev">
            
            <div class="form-group">
              <label for="form-name" id="labelName">お名前</label>
              <input type="text" id="form-name" name="name" class="form-control" required placeholder="デジタルユーザー名">
            </div>
            
            <div class="form-group">
              <label for="form-email" id="labelEmail">メールアドレス</label>
              <input type="email" id="form-email" name="email" class="form-control" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
              <label for="form-message" id="labelMessage">メッセージ</label>
              <textarea id="form-message" name="message" class="form-control" rows="4" required placeholder="技術的なお問い合わせやご報告内容を入力してください..."></textarea>
            </div>
            
            <div style="text-align: center; margin-top: 1.5rem;">
              <button type="submit" class="submit-btn" id="submitBtnText">送信を実行する</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    <!-- Cyber Security / Global Brand footer -->
    <div class="footer">
      © ryopc Global Digital Support // ryopcCEO
    </div>
  </div>

  <script>
    // グローバルな現在の言語状態
    let currentLang = 'ja';

    // 一般的なUIパーツの静的翻訳リソース
    const uiI18n = {
      ja: {
        contact_title: "サポートへ直接問い合わせる",

        placeholder_name: "Digital Username",
        placeholder_email: "your@email.com",
        placeholder_message: "Please enter your technical inquiry or bug report here...",
        home_btn: "Return to Home",
        status_btn: "Current System Status",
        security_label: "SECURITY: ",
        status_label: "SYSTEM_STATUS: "
      }
    };

    // 全10種類の多様なステータステーブル定義（日本語と英語に対応）
    const statusConfig = {
      "400": {
        badge: "HTTP 400 : Bad Request",
        ja: {
          title: "正しくないリクエストです",
          desc: "送信されたデジタルリクエストの構文、またはパラメータに誤りがあるため処理を進めることができません。<br>ブラウザのキャッシュをクリアしていただくか、指定URLが最新であるかをご確認ください。"
        },
        en: {
          title: "Bad Request",

    /**
     * URLのクエリパラメータを解釈します。
     */
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    /**
     * 多言語化された共通UIコンポーネントを適用します。
     */
    function applyStaticI18n() {
      const texts = uiI18n[currentLang];
      
      // お問い合わせアコーディオン
      document.getElementById('contactTitleText').innerText = texts.contact_title;
      document.getElementById('labelName').innerText = texts.contact_name;
      document.getElementById('labelEmail').innerText = texts.contact_email;
      document.getElementById('labelMessage').innerText = texts.contact_message;
      document.getElementById('submitBtnText').innerText = texts.contact_submit;
      
      // プレースホルダーの更新
      document.getElementById('form-name').placeholder = texts.placeholder_name;
      document.getElementById('form-email').placeholder = texts.placeholder_email;
      document.getElementById('form-message').placeholder = texts.placeholder_message;

      // ボタン
      document.getElementById('homeBtnText').innerText = texts.home_btn;
      document.getElementById('statusBtnText').innerText = texts.status_btn;

      // システムログヘッダー
      document.getElementById('logSecLabel').innerText = texts.security_label;
      document.getElementById('logSysLabel').innerText = texts.status_label;
    }

    /**
     * 言語を変更し、UI全体をアップデートします。
     */
    function setLanguage(lang) {
      currentLang = lang;
      
      // ボタンのactiveクラスをトグル
      document.getElementById('langJaBtn').classList.toggle('active', lang === 'ja');
      document.getElementById('langEnBtn').classList.toggle('active', lang === 'en');

      // 静的UIと言語依存のステータスデータを適用
      applyStaticI18n();
      applyStatusTheme();
    }

    /**
     * ステータスコードに基づく動的テーマ切り替え。
     */
    function applyStatusTheme() {
      // URLからステータスコード ?st= を解析。ない場合は503をデフォルト
      let statusCode = getQueryParam('st');
      if (!statusCode || !statusConfig[statusCode]) {
        statusCode = "503";
      }

      const conf = statusConfig[statusCode];
      const localizedContent = conf[currentLang] || conf['ja']; // 該当言語がない場合は日本語にフォールバック

      // 各UI要素をスマートに置換
      document.getElementById('statusBadge').innerHTML = conf.badge;
      document.getElementById('statusTitle').innerHTML = localizedContent.title;
      document.getElementById('statusDesc').innerHTML = localizedContent.desc;
      
      // ログデータの反映
      document.getElementById('logSec').innerHTML = conf.logSec;
      document.getElementById('logSys').innerHTML = conf.logSys;

      // CSSカスタマイズ用変数の上書き（バインディング）
      const root = document.documentElement;
      root.style.setProperty('--theme-color', conf.color);
      root.style.setProperty('--theme-color-rgb', conf.rgb);
      root.style.setProperty('--theme-glow', `rgba(${conf.rgb}, 0.2)`);

      // ボタンの出現コントロール
      const homeBtn = document.getElementById('homeBtn');
      const statusBtn = document.getElementById('statusBtn');

      if (conf.showHome && conf.showStatus) {
        homeBtn.style.display = 'inline-flex';
        homeBtn.className = 'status-btn btn-primary';
        statusBtn.style.display = 'inline-flex';
        statusBtn.className = 'status-btn btn-secondary';
      } else if (conf.showHome) {
        homeBtn.style.display = 'inline-flex';
        homeBtn.className = 'status-btn btn-primary';
        statusBtn.style.display = 'none';
      } else if (conf.showStatus) {
        homeBtn.style.display = 'none';
        statusBtn.style.display = 'inline-flex';
        statusBtn.className = 'status-btn btn-primary';
      } else {
        homeBtn.style.display = 'none';
        statusBtn.style.display = 'none';
      }

      // ドキュメントタイトルも変更
      document.title = `${conf.badge.split(' : ')[0]} | ryopc Global Digital Support`;
    }

    // アコーディオンのインタラクション（開閉処理）
    const trigger = document.getElementById('accordionTrigger');
    const content = document.getElementById('accordionContent');

    trigger.addEventListener('click', () => {
      trigger.classList.toggle('active');
      if (content.style.maxHeight) {
        content.style.maxHeight = null;
      } else {
        // スムーズなアニメーション展開
        content.style.maxHeight = content.scrollHeight + "px";
      }
    });

    // 初期化関数
    function init() {
      // 1. クエリパラメータから言語を取得 (?lang=en)
      let initialLang = getQueryParam('lang');
      
      // 2. なければブラウザ環境から判定
      if (!initialLang) {
        const browserLang = navigator.language || navigator.userLanguage;
        initialLang = (browserLang && browserLang.startsWith('ja')) ? 'ja' : 'en';
      }

      // 言語設定の正規化
      initialLang = (initialLang === 'ja' || initialLang === 'en') ? initialLang : 'ja';
      
      setLanguage(initialLang);
    }

    // 起動時に動的テーマ変更を適用
    window.onload = init;
  </script>
